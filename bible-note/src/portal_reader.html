<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Portal Reader</title>
  <link rel="stylesheet" href="portal_reader.css">
</head>
<body>

<div id="layout">

  <!-- LAYER SIDEBAR -->
  <div id="sidebar" class="dimmed">
    <div id="sidebar-inner">
      <div id="layer-list"></div>
      <button id="add-layer-btn" onclick="openLayerModal()">+</button>
    </div>
  </div>

  <!-- MAIN READER -->
  <div id="app">
    <div id="portal-header">
      <button class="back-btn" onclick="location.href='portals.html'">← Portals</button>
      <h2 id="portal-title">Loading...</h2>
    </div>
    <div id="verse-list"></div>
  </div>

  <button id="settings-btn" title="Settings" onclick="location.href='settings.html'">⚙︎</button>

  <!-- NOTES LAYER — floats above everything -->
  <div id="notes-layer"></div>

</div>

<!-- ADD LAYER MODAL -->
<div class="modal-overlay" id="layer-modal-overlay">
  <div class="modal">
    <h2>New Layer</h2>
    <div class="field">
      <label>Title (optional)</label>
      <input type="text" id="layer-title-input" placeholder="e.g. Theology, Context..." />
    </div>
    <div class="field">
      <label>Colour</label>
      <div id="colour-options">
        <div class="colour-swatch selected" data-colour="#7c6aff" style="background:#7c6aff"></div>
        <div class="colour-swatch" data-colour="#ff6b6b" style="background:#ff6b6b"></div>
        <div class="colour-swatch" data-colour="#ffd93d" style="background:#ffd93d"></div>
        <div class="colour-swatch" data-colour="#6bcb77" style="background:#6bcb77"></div>
        <div class="colour-swatch" data-colour="#4d96ff" style="background:#4d96ff"></div>
        <div class="colour-swatch" data-colour="#ff922b" style="background:#ff922b"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLayerModal()">Cancel</button>
      <button class="btn-save" onclick="saveLayer()">Create Layer</button>
    </div>
  </div>
</div>

<!-- DELETE LAYER MODAL -->
<div class="modal-overlay" id="delete-layer-modal-overlay">
  <div class="modal">
    <h2>Delete Layer</h2>
    <p style="color: var(--text-muted); font-family: sans-serif; font-size: 0.95rem; margin-bottom: 1.5rem;">
      Are you sure you want to delete <strong id="delete-layer-name" style="color: var(--text);"></strong>? All highlights and notes on this layer will be permanently deleted.
    </p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDeleteLayerModal()">Cancel</button>
      <button class="btn-delete" onclick="confirmDeleteLayer()">Delete</button>
    </div>
  </div>
</div>

<script src="settings-apply.js"></script>
<script src="portal_reader.js"></script>
</body>
</html>
