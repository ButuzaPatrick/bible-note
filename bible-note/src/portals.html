<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Portals</title>
  <link rel="stylesheet" href="/portals.css">
</head>
<body>

<div id="app">
  <h1>Study Portals</h1>
  <div id="portal-list"><p class="empty">No portals yet.</p></div>
  <button id="new-portal-btn" onclick="openModal()">+ New Portal</button>
</div>

<!-- CREATE PORTAL MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>New Study Portal</h2>

    <div class="field">
      <label>Book</label>
      <select id="modal-book"></select>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Start Chapter</label>
        <input type="number" id="modal-chapter-start" min="1" value="1" />
      </div>
      <div class="field">
        <label>Start Verse (optional)</label>
        <input type="number" id="modal-verse-start" min="1" placeholder="e.g. 1" />
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>End Chapter (optional)</label>
        <input type="number" id="modal-chapter-end" min="1" placeholder="e.g. 2" />
      </div>
      <div class="field">
        <label>End Verse (optional)</label>
        <input type="number" id="modal-verse-end" min="1" placeholder="e.g. 10" />
      </div>
    </div>

    <div class="field">
      <label>Portal Name (optional)</label>
      <input type="text" id="modal-title" placeholder="Your portal name" />
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="savePortal()">Create Portal</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal-overlay">
    <div class="modal">
        <h2>Delete Portal</h2>
        <p style="color: var(--text-muted); font-family: sans-serif; font-size: 0.95rem; margin-bottom: 1.5rem;">
            Are you sure you want to delete <strong id="delete-portal-name" style="color: var(--text);"></strong>? This cannot be undone.
        </p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn-delete" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<!-- NAV -->
<nav id="navbar">
  <button class="nav-btn" onclick="location.href='read.html'">
    <span class="nav-icon">📖</span>
    Read
  </button>
  <button class="nav-btn active">
    <span class="nav-icon">🗂</span>
    Portals
  </button>
</nav>

<script src="portals.js"></script>
</body>
</html>
